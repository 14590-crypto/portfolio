
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>กิจกรรม | Portfolio</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700&family=Noto+Sans+JP:wght@700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Noto Sans Thai',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    background:linear-gradient(-45deg,#ffd6f5,#fff0f8,#ffe6f4,#ffd9ef);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* พระอาทิตย์ */

.sun{
    position:fixed;
    top:50px;
    right:80px;
    width:150px;
    height:150px;
    background:#ff6666;
    border-radius:50%;
    opacity:.25;
    z-index:0;
}

/* ภูเขา */

.mountain{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:220px;
    background:linear-gradient(#dce8ff,#bdd2ff);
    clip-path:polygon(
    0% 100%,
    18% 100%,
    35% 45%,
    50% 100%,
    65% 35%,
    82% 100%,
    100% 100%);
    opacity:.45;
    z-index:0;
}

.container{
    position:relative;
    z-index:2;
    width:1100px;
    max-width:95%;
    margin:40px auto;
    text-align:center;
}

h1{
    font-size:48px;
    color:#ff1493;
    margin-bottom:10px;
}

.jp{
    color:#d44a92;
    letter-spacing:5px;
    margin-bottom:35px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
}

.card{
    background:rgba(255,255,255,.75);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:20px;
    box-shadow:0 12px 30px rgba(0,0,0,.15);
    transition:.4s;
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:15px;
    border:4px solid #ff80bf;
}

.card h2{
    color:#ff1493;
    margin-top:15px;
}

.card p{
    color:#555;
    margin-top:8px;
}

.back{
    margin-top:40px;
}

.back a{
    text-decoration:none;
    background:#ff4da6;
    color:white;
    padding:14px 30px;
    border-radius:12px;
    font-weight:bold;
    transition:.3s;
}

.back a:hover{
    background:#ff1493;
}

.sakura{
    position:fixed;
    top:-20px;
    width:15px;
    height:15px;
    background:#ffb6d9;
    border-radius:70% 0 70% 0;
    animation:fall linear forwards;
    z-index:1;
}

@keyframes fall{
    to{
        transform:translateY(110vh) translateX(120px) rotate(720deg);
        opacity:0;
    }
}

.cat{
    position:fixed;
    bottom:20px;
    left:-100px;
    font-size:60px;
    animation:walk 14s linear infinite;
}

@keyframes walk{
    0%{
        left:-100px;
        transform:scaleX(1);
    }
    49%{
        transform:scaleX(1);
    }
    50%{
        left:50%;
        transform:scaleX(-1);
    }
    100%{
        left:110%;
        transform:scaleX(-1);
    }
}

@media(max-width:768px){
    .gallery{
        grid-template-columns:1fr;
    }

    h1{
        font-size:36px;
    }
}
</style>

</head>

<body>

<div class="sun"></div>
<div class="mountain"></div>

<div class="container">

<h1>📸 certificate</h1>

<p class="jp"> certificate </p>

<div class="gallery">

<div class="card">
<img src="images/activity1.jpg" alt="กิจกรรมที่ 1">
<h2>กิจกรรมที่ 1</h2>
<p>เข้าร่วมกิจกรรมของโรงเรียน</p>
</div>

<div class="card">
<img src="images/activity2.jpg" alt="กิจกรรมที่ 2">
<h2>กิจกรรมที่ 2</h2>
<p>กิจกรรมจิตอาสา</p>
</div>

<div class="card">
<img src="images/activity3.jpg" alt="กิจกรรมที่ 3">
<h2>กิจกรรมที่ 3</h2>
<p>กิจกรรมแข่งขันหรือการอบรม</p>
</div>

</div>

<div class="back">
<a href="contact.html">🏠 ติดต่อ</a>
</div>

</div>

<div class="cat">🐱</div>

<script>
function createPetal(){

    const petal=document.createElement("div");
    petal.className="sakura";

    petal.style.left=Math.random()*window.innerWidth+"px";

    const size=Math.random()*12+10;
    petal.style.width=size+"px";
    petal.style.height=size+"px";

    petal.style.animationDuration=(Math.random()*5+6)+"s";

    document.body.appendChild(petal);

    setTimeout(()=>{
        petal.remove();
    },11000);
}

setInterval(createPetal,250);
</script>

</body>
</html>
```
