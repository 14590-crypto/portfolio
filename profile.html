<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Personal Profile</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Tahoma,sans-serif;
    background:linear-gradient(-45deg,#ffd6f5,#ffeefc,#ffc9e8,#ffe4f7);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}


@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}



.card{

    width:850px;
    max-width:95%;

    background:rgba(255,255,255,.85);
    backdrop-filter:blur(15px);

    border-radius:25px;

    padding:40px;

    text-align:center;

    box-shadow:0 15px 35px rgba(0,0,0,.2);

    animation:show 1s;

    z-index:2;

}



@keyframes show{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}



img{

    width:220px;
    height:220px;

    border-radius:50%;

    object-fit:cover;

    border:6px solid #ff69b4;

    box-shadow:
    0 0 25px rgba(255,105,180,.6);

    transition:.5s;

}



img:hover{

    transform:scale(1.08) rotate(5deg);

}



h1{

    margin-top:20px;

    font-size:45px;

    background:
    linear-gradient(45deg,#ff1493,#ff69b4,#ff8fd1);

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;

}



.subtitle{

    margin-top:10px;

    color:#d63384;

    font-size:20px;

}



.info{

    margin-top:35px;

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:20px;

}



.box{

    background:rgba(255,255,255,.7);

    padding:25px;

    border-radius:20px;

    box-shadow:0 8px 20px rgba(255,105,180,.2);

    transition:.3s;

}



.box:hover{

    transform:translateY(-8px);

}



.box h2{

    color:#ff1493;

    font-size:22px;

    margin-bottom:15px;

}



.box p{

    color:#555;

    font-size:18px;

    line-height:1.7;

    margin:10px 0;

}



.box span{

    color:#d63384;

    font-weight:bold;

}



.back{

    margin-top:35px;

}



.back a{

    text-decoration:none;

    background:

    linear-gradient(45deg,#ff69b4,#ff1493);

    color:white;

    padding:14px 35px;

    border-radius:50px;

    font-size:18px;

    font-weight:bold;

    display:inline-block;

    transition:.3s;

}



.back a:hover{

    transform:translateY(-5px);

}



.sakura{

    position:fixed;

    top:-20px;

    width:18px;

    height:18px;

    background:#ffb6d9;

    border-radius:70% 0 70% 0;

    pointer-events:none;

    animation:fall linear forwards;

}



@keyframes fall{

    from{

        transform:translateY(-30px) rotate(0deg);

    }

    to{

        transform:translateY(110vh)
        translateX(120px)
        rotate(720deg);

        opacity:0;

    }

}



@media(max-width:768px){

    .info{

        grid-template-columns:1fr;

    }


    h1{

        font-size:35px;

    }

}


</style>

</head>


<body>


<div class="card">


<img src="images/IMG_6140.jpeg" alt="Profile Image">


<h1>Personal Profile</h1>


<p class="subtitle">
Science-Mathematics Student | Web Developer
</p>



<div class="info">


<div class="box">

<h2>👤 ประวัติส่วนตัว</h2>


<p>
<span>ชื่อ</span><br>
เอกพจน์ พิยวงษ์
</p>


<p>
<span>ชื่อเล่น</span><br>
เจ๋ง
</p>


<p>
<span>อายุ</span><br>
18 ปี
</p>


</div>




<div class="box">

<h2>🏫 การศึกษา</h2>


<p>
<span>โรงเรียน</span><br>
โรงเรียนพานทอง
</p>


<p>
<span>ระดับชั้น</span><br>
ม6/1
</p>


<p>
<span>แผนการเรียน</span><br>
วิทยาศาสตร์และคณิตศาสตร์
</p>


</div>





<div class="box">

<h2>💻 ทักษะ</h2>


<p>
มีความเป็นผู้นำ
</p>


<p>
ใช้โปรแกรมตัดต่อ
</p>


<p>
มีสมาธิ
</p>


</div>



</div>




<div class="back">

<a href="education.html">
➡️ ประวัติการศึกษา
</a>

</div>



</div>




<script>


function createPetal(){


const petal=document.createElement("div");


petal.className="sakura";


petal.style.left=
Math.random()*window.innerWidth+"px";


let size=Math.random()*12+10;


petal.style.width=size+"px";

petal.style.height=size+"px";


petal.style.animationDuration=
(Math.random()*5+5)+"s";


document.body.appendChild(petal);



setTimeout(()=>{

petal.remove();

},10000);



}



setInterval(createPetal,250);



</script>



</body>
</html>
