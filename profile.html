<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ประวัติส่วนตัว</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Tahoma,sans-serif;
    background:linear-gradient(-45deg,#ffd6f5,#ffeefc,#ffc9e8,#ffe4f7);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:700px;
    max-width:90%;
    background:rgba(255,255,255,.85);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:35px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
    animation:show 1s;
    z-index:2;
}

@keyframes show{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

img{
    width:220px;
    height:220px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid #ff69b4;
    transition:.5s;
    box-shadow:0 10px 25px rgba(255,105,180,.4);
}

img:hover{
    transform:scale(1.08) rotate(3deg);
}

h1{
    margin-top:20px;
    font-size:45px;
    background:linear-gradient(45deg,#ff1493,#ff69b4,#ff8fd1);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.info{
    margin-top:25px;
    font-size:22px;
    color:#444;
    line-height:2;
}

.info span{
    color:#d63384;
    font-weight:bold;
}

.back{
    margin-top:30px;
}

.back a{
    text-decoration:none;
    background:#ff4fa3;
    color:white;
    padding:12px 25px;
    border-radius:12px;
    font-size:18px;
    transition:.3s;
}

.back a:hover{
    background:#d63384;
    transform:translateY(-5px);
    display:inline-block;
}

/* กลีบดอกซากุระ */
.sakura{
    position:fixed;
    top:-20px;
    width:18px;
    height:18px;
    background:#ffb6d9;
    border-radius:70% 0 70% 0;
    pointer-events:none;
    animation:fall linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-30px) rotate(0deg);
    }
    to{
        transform:translateY(110vh) translateX(120px) rotate(720deg);
        opacity:0;
    }
}

</style>

</head>

<body>

<div class="card">

    <img src="images/IMG_5585.jpeg" alt="รูปโปรไฟล์">

    <h1>ประวัติส่วนตัว</h1>

    <div class="info">

        <p><span>👤 ชื่อ :</span> เอกพจน์ พิยวงษ์</p>

        <p><span>😊 ชื่อเล่น :</span> เจ๋ง</p>

        <p><span>🎂 อายุ :</span> 18 ปี</p>

        <p><span>🏫 โรงเรียน :</span> โรงเรียนพานทอง</p>

        <p><span>📚 ระดับชั้น :</span> มัธยมศึกษาปีที่ 6/1</p>

        <p><span>💖 งานอดิเรก :</span> ฟังเพลง เล่นเกม และเขียนโปรแกรม</p>

    </div>

    <div class="back">
        <a href="index.html">🏠 กลับหน้าหลัก</a>
    </div>

</div>

<script>
function createPetal(){

    const petal=document.createElement("div");

    petal.className="sakura";

    petal.style.left=Math.random()*window.innerWidth+"px";

    const size=Math.random()*12+10;

    petal.style.width=size+"px";
    petal.style.height=size+"px";

    petal.style.animationDuration=(Math.random()*5+5)+"s";

    document.body.appendChild(petal);

    setTimeout(()=>{
        petal.remove();
    },10000);
}

setInterval(createPetal,250);
</script>

</body>
</html>
