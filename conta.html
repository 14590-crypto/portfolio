<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ติดต่อ | Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Tahoma,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
    background:linear-gradient(-45deg,#ffd6f5,#ffeefc,#ffc9e8,#ffe4f7,#fff0f8);
    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ฟองแสง */
.bubble{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,.25);
    animation:float 10s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh) scale(.5);
        opacity:0;
    }
    30%{
        opacity:1;
    }
    to{
        transform:translateY(-120px) scale(1.3);
        opacity:0;
    }
}

.container{
    width:90%;
    max-width:750px;
    background:rgba(255,255,255,.88);
    backdrop-filter:blur(15px);
    border-radius:30px;
    padding:45px;
    text-align:center;
    box-shadow:0 20px 50px rgba(255,20,147,.25);
    animation:fadeIn 1s ease;
    z-index:10;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.profile{
    width:170px;
    height:170px;
    border-radius:50%;
    border:6px solid #ff5fa2;
    object-fit:cover;
    box-shadow:0 15px 35px rgba(255,20,147,.4);
    transition:.5s;
}

.profile:hover{
    transform:scale(1.08) rotate(4deg);
}

h1{
    margin-top:20px;
    font-size:48px;
    background:linear-gradient(45deg,#ff1493,#ff69b4,#ff99cc);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    color:#666;
    margin:15px 0 35px;
    font-size:18px;
}

.card{
    background:rgba(255,255,255,.95);
    border-radius:20px;
    padding:20px;
    margin:20px 0;
    box-shadow:0 12px 30px rgba(0,0,0,.08);
    transition:.4s;
}

.card:hover{
    transform:translateY(-8px) scale(1.03);
    box-shadow:0 20px 40px rgba(255,20,147,.25);
}

.card h2{
    color:#ff1493;
    margin-bottom:10px;
}

.card a{
    text-decoration:none;
    color:#444;
    font-size:18px;
    font-weight:bold;
}

.btn{
    display:inline-block;
    margin-top:30px;
    text-decoration:none;
    color:#fff;
    background:linear-gradient(45deg,#ff69b4,#ff1493);
    padding:15px 35px;
    border-radius:50px;
    font-weight:bold;
    transition:.4s;
    box-shadow:0 10px 25px rgba(255,20,147,.35);
}

.btn:hover{
    transform:translateY(-5px) scale(1.08);
}

footer{
    margin-top:30px;
    color:#666;
}

@media(max-width:768px){

.container{
    padding:25px;
}

.profile{
    width:140px;
    height:140px;
}

h1{
    font-size:38px;
}

}
</style>
