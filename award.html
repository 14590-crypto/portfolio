<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ผลงาน</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Tahoma,sans-serif;
    background:linear-gradient(-45deg,#ffd6f5,#ffeefc,#ffc9e8,#ffe4f7);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
    overflow-x:hidden;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    width:1100px;
    max-width:92%;
    margin:50px auto;
    background:rgba(255,255,255,.88);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:40px;
    box-shadow:0 20px 40px rgba(0,0,0,.15);
    animation:fadeIn 1s ease;
    position:relative;
    z-index:2;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    text-align:center;
    font-size:50px;
    margin-bottom:10px;
    background:linear-gradient(45deg,#ff1493,#ff69b4,#ff8fd1);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:35px;
    font-size:18px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.card{
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
    transition:.35s;
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
    box-shadow:0 20px 35px rgba(255,105,180,.35);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.content{
    padding:18px;
}

.content h2{
    color:#d63384;
    margin-bottom:10px;
}

.content p{
    color:#555;
    line-height:1.7;
}

.back{
    text-align:center;
    margin-top:40px;
}

.back a{
    text-decoration:none;
    background:linear-gradient(45deg,#ff69b4,#ff1493);
    color:white;
    padding:14px 28px;
    border-radius:12px;
    display:inline-block;
    transition:.3s;
}

.back a:hover{
    transform:translateY(-5px);
}

/* Sakura */

.sakura{
    position:fixed;
    top:-20px;
    width:18px;
    height:18px;
    background:#ffb6d9;
    border-radius:70% 0 70% 0;
    pointer-events:none;
    animation:fall linear forwards;
    z-index:1;
}

@keyframes fall{
    from{
        transform:translateY(-20px) rotate(0deg);
    }
    to{
        transform:translateY(110vh) translateX(120px) rotate(720deg);
        opacity:0;
    }
}

@media(max-width:768px){
    h1{
        font-size:38px;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>🏆 ผลงาน</h1>
<p class="subtitle">กิจกรรมและผลงานที่ภาคภูมิใจ</p>

<div class="gallery">

<div class="card">
<img src="images/award1.jpg" alt="ผลงานที่ 1">
<div class="content">
<h2>🏅 ผลงานที่ 1</h2>
<p>
ใส่รายละเอียดผลงาน เช่น การแข่งขัน กิจกรรม หรือเกียรติบัตร
</p>
</div>
</div>

<div class="card">
<img src="images/award2.jpg" alt="ผลงานที่ 2">
<div class="content">
<h2>🎖 ผลงานที่ 2</h2>
<p>
ใส่รายละเอียดผลงาน พร้อมวันที่หรือสถานที่จัดกิจกรรม
</p>
</div>
</div>

<div class="card">
<img src="images/award3.jpg" alt="ผลงานที่ 3">
<div class="content">
<h2>🌟 ผลงานที่ 3</h2>
<p>
สามารถเพิ่มรูปภาพและคำอธิบายได้ตามต้องการ
</p>
</div>
</div>

</div>

<div class="back">
<a href="index.html">🏠 กลับหน้าหลัก</a>
</div>

</div>

<script>
function createPetal(){

const petal=document.createElement("div");

petal.className="sakura";

petal.style.left=Math.random()*window.innerWidth+"px";

const size=Math.random()*12+10;

petal.style.width=size+"px";
petal.style.height=size+"px";

petal.style.animationDuration=(Math.random()*5+5)+"s";

document.body.appendChild(petal);

setTimeout(()=>{
petal.remove();
},10000);

}

setInterval(createPetal,250);
</script>

</body>
</html>
