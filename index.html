<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio เอกพจน์ พิยวงษ์</title>

    <style>.cat-box{
    position:fixed;
    bottom:25px;
    left:-150px;
    z-index:5;
    animation:catWalk 15s linear infinite;
}

.cat{
    width:100px;
    filter:drop-shadow(0 12px 8px rgba(0,0,0,.35));
}

.shadow{
    position:absolute;
    bottom:-5px;
    left:20px;
    width:70px;
    height:15px;
    background:rgba(0,0,0,.25);
    border-radius:50%;
    filter:blur(5px);
}

@keyframes catWalk{

    0%{
        left:-150px;
    }

    50%{
        left:50%;
    }

    100%{
        left:110%;
    }

}.cat{
    position:fixed;
    bottom:20px;
    left:-100px;
    font-size:70px;
    animation:walkCat 12s linear infinite;
    z-index:3;
}


@keyframes walkCat{

    0%{
        left:-100px;
        transform:scaleX(1);
    }

    45%{
        left:45%;
        transform:scaleX(1);
    }

    50%{
        left:50%;
        transform:scaleX(-1);
    }

    95%{
        left:110%;
        transform:scaleX(-1);
    }

    100%{
        left:110%;
    }

}
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Tahoma,sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            overflow:hidden;
            background:linear-gradient(-45deg,#ffd6f5,#ffeefc,#ffc9e8,#ffe4f7);
            background-size:400% 400%;
            animation:bgMove 12s ease infinite;
        }

        @keyframes bgMove{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        .container{
            width:850px;
            max-width:90%;
            background:rgba(255,255,255,.85);
            backdrop-filter:blur(10px);
            border-radius:20px;
            padding:35px;
            text-align:center;
            box-shadow:0 15px 40px rgba(0,0,0,.15);
            animation:fadeIn 1s ease;
            z-index:2;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        img{
            width:220px;
            height:220px;
            object-fit:cover;
            border-radius:50%;
            border:6px solid #ff66b2;
            box-shadow:0 10px 30px rgba(255,102,178,.35);
            transition:.5s;
        }

        img:hover{
            transform:scale(1.08) rotate(3deg);
            box-shadow:0 20px 45px rgba(255,102,178,.55);
        }

        h1{
            margin-top:20px;
            font-size:48px;
            background:linear-gradient(45deg,#ff1493,#ff69b4,#ff8fd1);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        h2{
            margin-top:15px;
            color:#222;
        }

        p{
            margin-top:10px;
            font-size:18px;
            color:#555;
        }

        .menu{
            margin-top:35px;
        }

        .menu a{
            text-decoration:none;
            background:linear-gradient(45deg,#ff69b4,#ff1493);
            color:white;
            padding:14px 22px;
            margin:8px;
            border-radius:12px;
            display:inline-block;
            font-weight:bold;
            transition:.35s;
            box-shadow:0 8px 20px rgba(255,20,147,.3);
        }

        .menu a:hover{
            transform:translateY(-6px) scale(1.08);
            box-shadow:0 15px 30px rgba(255,20,147,.45);
        }

        footer{
            margin-top:35px;
            color:#666;
            font-size:15px;
        }

        /* Sakura Effect */
        .sakura{
            position:fixed;
            top:-30px;
            width:18px;
            height:18px;
            background:#ffb6d9;
            border-radius:70% 0 70% 0;
            opacity:.8;
            pointer-events:none;
            animation:fall linear forwards;
            z-index:1;
        }

        @keyframes fall{
            0%{
                transform:translateY(-30px) rotate(0deg);
                opacity:1;
            }
            100%{
                transform:translateY(110vh) translateX(120px) rotate(720deg);
                opacity:0;
            }
        }

        @media (max-width:768px){

            .container{
                width:95%;
                padding:25px;
            }

            img{
                width:180px;
                height:180px;
            }

            h1{
                font-size:36px;
            }

            .menu a{
                display:block;
                margin:10px auto;
                width:80%;
            }
        }

    </style>

</head>

<script>
function createPetal(){

    const petal=document.createElement("div");
    petal.classList.add("sakura");

    petal.style.left=Math.random()*window.innerWidth+"px";

    const size=Math.random()*12+10;
    petal.style.width=size+"px";
    petal.style.height=size+"px";

    petal.style.animationDuration=(Math.random()*5+6)+"s";
    petal.style.opacity=Math.random();

    document.body.appendChild(petal);

    setTimeout(()=>{
        petal.remove();
    },11000);
}

setInterval(createPetal,300);
</script>
<div class="cat">🐱</div>
</body>
