<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',Tahoma,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;
background:linear-gradient(-45deg,#ffd6f5,#ffeefc,#ffc9e8,#ffe4f7);background-size:400% 400%;animation:bg 12s ease infinite}
@keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
body:before{content:"";position:fixed;right:80px;top:60px;width:170px;height:170px;border-radius:50%;background:#ff6666;opacity:.25}
body:after{content:"";position:fixed;left:0;bottom:0;width:100%;height:240px;background:linear-gradient(#eef5ff,#cfdcff);clip-path:polygon(0 100%,20% 100%,35% 45%,50% 100%,65% 35%,80% 100%,100% 100%);opacity:.5}
.container{position:relative;z-index:2;width:850px;max-width:90%;padding:35px;text-align:center;background:rgba(255,255,255,.55);backdrop-filter:blur(18px);border-radius:24px;box-shadow:0 15px 40px rgba(0,0,0,.15)}
img{width:220px;height:220px;border-radius:50%;object-fit:cover;border:6px solid #ff66b2}
h1{margin:15px 0;font-size:54px;background:linear-gradient(90deg,#ff5f9e,#ffb6d9,#ff5f9e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.jp{color:#d14b8f;letter-spacing:3px;margin-bottom:10px}
.menu a{text-decoration:none;display:inline-block;margin:8px;padding:14px 22px;border-radius:12px;color:#fff;background:linear-gradient(45deg,#ff8fc6,#ff5f9e)}
.sakura{position:fixed;top:-20px;background:#ffb6d9;width:14px;height:14px;border-radius:70% 0 70% 0;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) translateX(120px) rotate(720deg);opacity:0}}
.lantern{position:fixed;top:15px;font-size:60px;animation:swing 3s ease-in-out infinite}.left{left:25px}.right{right:25px}
@keyframes swing{50%{transform:rotate(8deg)}}
.cat{position:fixed;bottom:20px;left:-100px;font-size:70px;animation:walk 12s linear infinite}
@keyframes walk{0%{left:-100px;transform:scaleX(1)}49%{transform:scaleX(1)}50%{transform:scaleX(-1);left:50%}100%{left:110%;transform:scaleX(-1)}}
</style>
</head>

function petal(){const p=document.createElement('div');p.className='sakura';p.style.left=Math.random()*innerWidth+'px';let s=10+Math.random()*12;p.style.width=s+'px';p.style.height=s+'px';p.style.animationDuration=(6+Math.random()*5)+'s';document.body.appendChild(p);setTimeout(()=>p.remove(),11000)}
