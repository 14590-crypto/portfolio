<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ประวัติการศึกษา</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Tahoma,sans-serif;
    background:linear-gradient(-45deg,#ffd6f5,#ffeefc,#ffc9e8,#ffe4f7);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
    overflow-x:hidden;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    width:900px;
    max-width:90%;
    margin:50px auto;
    background:rgba(255,255,255,.88);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:40px;
    box-shadow:0 20px 40px rgba(0,0,0,.15);
    animation:fadeIn 1s ease;
    position:relative;
    z-index:2;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    text-align:center;
    font-size:50px;
    margin-bottom:40px;
    background:linear-gradient(45deg,#ff1493,#ff69b4,#ff8fd1);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.timeline{
    position:relative;
    margin:30px 0;
}

.timeline::before{
    content:"";
    position:absolute;
    left:25px;
    top:0;
    width:5px;
    height:100%;
    background:#ff69b4;
    border-radius:10px;
}

.item{
    position:relative;
    margin-left:70px;
    margin-bottom:35px;
    background:white;
    padding:20px;
    border-radius:18px;
    box-shadow:0 8px 20px rgba(0,0,0,.1);
    transition:.35s;
}

.item:hover{
    transform:translateY(-8px) scale(1.02);
    box-shadow:0 15px 35px rgba(255,105,180,.35);
}

.item::before{
    content:"🎓";
    position:absolute;
    left:-58px;
    top:18px;
    width:40px;
    height:40px;
    background:#ff69b4;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    color:white;
}

.year{
    color:#d63384;
    font-size:22px;
    font-weight:bold;
    margin-bottom:8px;
}

.school{
    font-size:24px;
    color:#333;
    font-weight:bold;
}

.detail{
    color:#666;
    margin-top:8px;
    font-size:18px;
}

.back{
    text-align:center;
    margin-top:40px;
}

.back a{
    text-decoration:none;
    background:linear-gradient(45deg,#ff69b4,#ff1493);
    color:white;
    padding:14px 28px;
    border-radius:12px;
    font-size:18px;
    transition:.3s;
    display:inline-block;
}

.back a:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 25px rgba(255,20,147,.35);
}

/* Sakura */

.sakura{
    position:fixed;
    top:-20px;
    width:18px;
    height:18px;
    background:#ffb6d9;
    border-radius:70% 0 70% 0;
    pointer-events:none;
    animation:fall linear forwards;
    z-index:1;
}

@keyframes fall{
    from{
        transform:translateY(-20px) rotate(0deg);
    }
    to{
        transform:translateY(110vh) translateX(120px) rotate(720deg);
        opacity:0;
    }
}

@media(max-width:768px){

.timeline::before{
left:15px;
}

.item{
margin-left:50px;
}

h1{
font-size:38px;
}

.school{
font-size:20px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>🎓 ประวัติการศึกษา</h1>

<div class="timeline">

<div class="item">
<div class="year">พ.ศ. 2563 - 2565</div>
<div class="school">โรงเรียนพานทอง</div>
<div class="detail">
ระดับชั้นมัธยมศึกษาตอนต้น (ม.1 - ม.3)
</div>
</div>

<div class="item">
<div class="year">พ.ศ. 2566 - ปัจจุบัน</div>
<div class="school">โรงเรียนพานทอง</div>
<div class="detail">
ระดับชั้นมัธยมศึกษาตอนปลาย (ม.4 - ม.6)
</div>
</div>

</div>

<div class="back">
    <a href="award.html">➡️ หน้าผลงาน</a>
</div>
</div>

</div>

<script>

function createPetal(){

const petal=document.createElement("div");

petal.className="sakura";

petal.style.left=Math.random()*window.innerWidth+"px";

const size=Math.random()*12+10;

petal.style.width=size+"px";
petal.style.height=size+"px";

petal.style.animationDuration=(Math.random()*5+5)+"s";

document.body.appendChild(petal);

setTimeout(()=>{
petal.remove();
},10000);

}

setInterval(createPetal,250);

</script>

</body>
</html>
